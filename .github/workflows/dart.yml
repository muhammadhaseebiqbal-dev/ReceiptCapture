name: iOS-ipa-and-simulator-build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      build_ios:
        description: 'Also run iOS IPA and simulator builds'
        required: false
        default: false
        type: boolean

jobs:
  build-android-apk:
    name: 🤖 Android APK Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: receipt_capture

      - name: Build Android APK (release)
        run: flutter build apk --release
        working-directory: receipt_capture

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: receipt-capture-release-apk
          path: receipt_capture/build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: 🎉 iOS Build (IPA)
    runs-on: macos-latest
    needs: build-android-apk
    if: ${{ inputs.build_ios == true }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Install dependencies
        run: flutter pub get
        working-directory: receipt_capture

      - name: Update CocoaPods
        run: pod repo update
        working-directory: receipt_capture/ios

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
        working-directory: receipt_capture

      - name: Prepare IPA payload
        run: |
          mkdir Payload
          mv Runner.app Payload/
          zip -qq -r -9 FlutterIpaExport.ipa Payload
        working-directory: receipt_capture/build/ios/iphoneos

      - name: Upload IPA to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: receipt_capture/build/ios/iphoneos/FlutterIpaExport.ipa
          tag: v1.0
          overwrite: true
          body: "This is the first iOS release build (.ipa)"

  build-ios-simulator:
    name: 🧪 iOS Simulator Build (for Appetize.io)
    runs-on: macos-latest
    needs: build-ios
    if: ${{ inputs.build_ios == true }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Install dependencies
        run: flutter pub get
        working-directory: receipt_capture

      - name: Build iOS Simulator App
        run: flutter build ios --simulator --debug
        working-directory: receipt_capture

      - name: Zip Simulator Build
        run: |
          cd receipt_capture/build/ios/iphonesimulator
          zip -r app.zip Runner.app

      - name: Upload simulator build
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: receipt_capture/build/ios/iphonesimulator/app.zip
